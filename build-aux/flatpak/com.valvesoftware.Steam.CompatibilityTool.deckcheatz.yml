id: com.valvesoftware.Steam.CompatibilityTool.deckcheatz-shim
default-branch: stable
sdk: org.gnome.Sdk//46
runtime: com.valvesoftware.Steam
runtime-version: stable
build-extension: true
appstream-compose: false
separate-locales: false
finish-args:
  - "--socket=fallback-x11"
  - "--socket=wayland"
  - "--device=dri"
  - "--share=ipc"
build-options:
  prefix: "/app/share/steam/compatibilitytools.d/DeckCheatz-Shim"
  strip: true
modules:
  - name: deckcheatz-shim
    buildsystem: simple
    build-commands:
      - "cargo --offline --frozen fetch --verbose"
      - "cargo --offline --frozen build --release --verbose"
      - "install -Dm755 -t ${FLATPAK_DEST} target/release/deckcheatz"
    sources:
      - type: dir
        path: ../../.
      - generated-cargo-sources.json
  - name: steamcompat
    buildsystem: simple
    build-commands:
      - "install -Dm644 -t ${FLATPAK_DEST} compatibilitytool.vdf"
      - "install -Dm644 -t ${FLATPAK_DEST} toolmanifest.vdf"
    sources:
      - type: file
        path: "steam/toolmanifest.vdf"
      - type: file
        path: "steam/compatibilitytool.vdf"
  - name: meta
    buildsystem: simple
    build-commands:
      - "install -Dm644 -t ${FLATPAK_DEST}/app/share/metainfo ${FLATPAK_ID}.metainfo.xml"
    sources:
      - type: file
        path: ${FLATPAK_ID}.metainfo.xml
